<body>
  <div class="sc-stage">
    <div class="sc-scaler" id="scaler">
      <div id="root"></div>
    </div>
  </div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <script type="text/babel" src="sc-screens2.jsx"></script>
  <script type="text/babel" src="sc-premium.jsx"></script>
  <script type="text/babel" src="sc-app.jsx"></script>

  <script>
    // Scale the 393×852 phone to fit the viewport (with margin), never upscaling past 1.
    function fitPhone() {
      var scaler = document.getElementById("scaler");
      if (!scaler) return;
      var pad = 48;
      var sw = (window.innerWidth - pad) / 393;
      var sh = (window.innerHeight - pad) / 852;
      var s = Math.min(sw, sh, 1.08);
      scaler.style.transform = "scale(" + s + ")";
    }
    window.addEventListener("resize", fitPhone);
    // re-fit after fonts/React mount
    var _fit = setInterval(fitPhone, 250);
    setTimeout(function () { clearInterval(_fit); }, 3000);
    fitPhone();
  </script>
